<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주기율표</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#222}
.pt-wrap{padding:12px;max-width:100%}
.pt-title{font-size:18px;font-weight:600;color:#222;margin-bottom:12px;text-align:center}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.legend{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.leg-item{display:flex;align-items:center;gap:4px;font-size:12px;color:#555}
.leg-dot{width:12px;height:12px;border-radius:2px;border:1px solid rgba(0,0,0,0.2)}
.filter-btn{font-size:11px;padding:4px 10px;border:1px solid #bbb;border-radius:6px;background:#fff;color:#555;cursor:pointer;transition:all 0.15s}
.filter-btn:hover{background:#eee}
.filter-btn.active{background:#e8e8e8;color:#222;border-color:#888;font-weight:500}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.pt-grid{display:inline-grid;gap:2px}
.period-label{display:flex;align-items:center;justify-content:center;font-size:10px;color:#888;font-weight:500}
.group-label{display:flex;align-items:center;justify-content:center;font-size:9px;color:#aaa;padding-bottom:2px}
.el-cell{border-radius:4px;border:1px solid rgba(0,0,0,0.15);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform 0.1s,box-shadow 0.1s;overflow:hidden}
.el-cell:hover{transform:scale(1.12);z-index:10;box-shadow:0 3px 10px rgba(0,0,0,0.2)}
.el-cell.dimmed{opacity:0.15}
.el-num{line-height:1;color:rgba(0,0,0,0.5)}
.el-sym{font-weight:600;line-height:1.1;color:rgba(0,0,0,0.85)}
.el-name{line-height:1;color:rgba(0,0,0,0.55);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;text-align:center}
.placeholder{border-radius:4px;border:1px dashed #bbb;display:flex;align-items:center;justify-content:center;color:#aaa;cursor:default}
.empty{background:transparent;border:none}
.series-section{margin-top:14px;text-align:center}
.series-title{font-size:12px;color:#666;margin-bottom:4px;font-weight:500}
.series-row{display:flex;gap:2px;overflow-x:auto;padding-bottom:4px;justify-content:center}

/* Detail panel */
.detail-panel{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:clamp(8px,3vw,20px)}
.detail-card{background:#fff;border-radius:12px;width:100%;max-width:min(520px,100%);max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.18);display:flex;flex-direction:column}
.detail-header{padding:clamp(12px,3vw,20px) clamp(12px,3vw,20px) clamp(10px,2vw,16px);border-radius:12px 12px 0 0;position:relative;flex-shrink:0}
.detail-sym{font-size:clamp(36px,10vw,64px);font-weight:700;line-height:1;color:rgba(0,0,0,0.8)}
.detail-name{font-size:clamp(15px,4vw,22px);font-weight:600;color:#222;margin-top:4px}
.detail-sub{font-size:clamp(11px,2.5vw,13px);color:rgba(0,0,0,0.5);margin-top:2px}
.detail-body{padding:clamp(10px,2.5vw,16px) clamp(12px,3vw,20px) clamp(12px,3vw,20px);overflow-y:auto}
.close-btn{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.12);border:none;border-radius:50%;width:clamp(26px,6vw,32px);height:clamp(26px,6vw,32px);cursor:pointer;font-size:clamp(14px,3.5vw,18px);display:flex;align-items:center;justify-content:center;color:rgba(0,0,0,0.55);line-height:1}
.close-btn:hover{background:rgba(0,0,0,0.2)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.stat-card{background:#f5f5f5;border-radius:8px;padding:clamp(6px,1.5vw,10px) clamp(8px,2vw,12px)}
.stat-label{font-size:clamp(10px,2.2vw,11px);color:#888}
.stat-val{font-size:clamp(13px,3.5vw,17px);font-weight:600;color:#222;margin-top:2px}
.info-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #eee}
.info-row:last-child{border-bottom:none}
.info-label{font-size:clamp(11px,2.5vw,12px);color:#888;min-width:44px;padding-top:1px;font-weight:500;flex-shrink:0}
.info-val{font-size:clamp(11px,2.5vw,13px);color:#333;line-height:1.5}
.atom-canvas{display:block;margin:6px auto}
.electron-info{background:#f0f4ff;border-radius:8px;padding:clamp(8px,2vw,10px) clamp(10px,2.5vw,12px);margin-top:8px}
.electron-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.e-chip{background:#fff;border:1px solid #ccd6f0;border-radius:6px;padding:2px 7px;font-size:clamp(10px,2.2vw,11px);color:#334}
.e-total{font-size:clamp(10px,2.2vw,11px);color:#778;margin-top:5px}
.atom-title{font-size:clamp(12px,2.8vw,13px);font-weight:600;color:#333;margin-top:12px;margin-bottom:5px}
.hint{margin-top:10px;text-align:center;font-size:11px;color:#aaa}
@media(max-width:400px){
  .detail-panel{padding:0}
  .detail-card{border-radius:12px 12px 0 0;max-height:95vh;position:fixed;bottom:0;left:0;right:0;width:100%}
}
</style>
</head>
<body>
<div class="pt-wrap">
  <div class="pt-title">주기율표 (원자번호 1–103)</div>
  <div class="controls">
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:#85B7EB"></div>금속</div>
      <div class="leg-item"><div class="leg-dot" style="background:#C0DD97"></div>준금속</div>
      <div class="leg-item"><div class="leg-dot" style="background:#FAC775"></div>비금속</div>
    </div>
    <div style="margin-left:auto;display:flex;gap:4px;flex-wrap:wrap">
      <button class="filter-btn active" data-cat="all">전체</button>
      <button class="filter-btn" data-cat="metal">금속</button>
      <button class="filter-btn" data-cat="metalloid">준금속</button>
      <button class="filter-btn" data-cat="nonmetal">비금속</button>
    </div>
  </div>
  <div class="table-scroll">
    <div id="pt-grid" class="pt-grid"></div>
  </div>
  <div class="series-section">
    <div class="series-title">란타넘족 (57–71)</div>
    <div class="series-row" id="lant-row"></div>
  </div>
  <div class="series-section">
    <div class="series-title">악티늄족 (89–103)</div>
    <div class="series-row" id="act-row"></div>
  </div>
  <div class="hint">원소를 클릭하면 상세 정보를 볼 수 있습니다</div>
</div>

<!-- Detail Panel -->
<div class="detail-panel" id="detail-panel" style="display:none">
  <div class="detail-card">
    <div class="detail-header" id="detail-header">
      <button class="close-btn" id="close-btn">✕</button>
      <div class="detail-sym" id="d-sym"></div>
      <div class="detail-name" id="d-name"></div>
      <div class="detail-sub" id="d-sub"></div>
    </div>
    <div class="detail-body">
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">원자번호</div><div class="stat-val" id="d-num"></div></div>
        <div class="stat-card"><div class="stat-label">원자량</div><div class="stat-val" id="d-mass"></div></div>
        <div class="stat-card"><div class="stat-label">주기 / 족</div><div class="stat-val" id="d-pg"></div></div>
        <div class="stat-card"><div class="stat-label">분류</div><div class="stat-val" id="d-cat"></div></div>
      </div>
      <div class="info-row"><div class="info-label">설명</div><div class="info-val" id="d-desc"></div></div>
      <div class="info-row"><div class="info-label">용도</div><div class="info-val" id="d-uses"></div></div>
      <div class="info-row"><div class="info-label">발견</div><div class="info-val" id="d-disc"></div></div>
      <div class="atom-title">원자 구조</div>
      <canvas id="atom-canvas" class="atom-canvas" width="220" height="220"></canvas>
      <div class="electron-info">
        <div style="font-size:11px;color:#667;font-weight:500">전자 껍질 배치</div>
        <div class="electron-chips" id="e-chips"></div>
        <div class="e-total" id="e-total"></div>
      </div>
    </div>
  </div>
</div>

  {sym:"Md",name:"멘델레븀",num:101,mass:258.00,period:7,group:3,cat:"metal",e:[2,8,18,32,31,8,2],desc:"멘델레예프의 이름을 딴 원소입니다.",uses:"과학 연구",disc:"1955년 알버트 기오르소"},
  {sym:"No",name:"노벨륨",num:102,mass:259.00,period:7,group:3,cat:"metal",e:[2,8,18,32,32,8,2],desc:"알프레드 노벨의 이름을 딴 원소입니다.",uses:"과학 연구",disc:"1958년 알버트 기오르소"},
  {sym:"Lr",name:"로렌슘",num:103,mass:262.00,period:7,group:3,cat:"metal",e:[2,8,18,32,32,9,2],desc:"악티늄족의 마지막 원소입니다.",uses:"과학 연구",disc:"1961년 알버트 기오르소"},
];

const CAT_COLORS = {metal:"#85B7EB", metalloid:"#C0DD97", nonmetal:"#FAC775"};
const CAT_NAMES  = {metal:"금속", metalloid:"준금속", nonmetal:"비금속"};
const SHELLS     = ['K','L','M','N','O','P','Q'];

let activeFilter = 'all';

function makeCellSize() {
  const w = document.querySelector('.pt-wrap').offsetWidth || 360;
  const avail = w - 24 - 40; // padding + period-label column
  return Math.max(30, Math.min(52, Math.floor(avail / 18)));
}

function getColor(el) { return CAT_COLORS[el.cat] || '#ccc'; }

function renderCell(el, size) {
  const d = document.createElement('div');
  if (!el) { d.className = 'empty'; d.style.cssText = `width:${size}px;height:${size}px`; return d; }
  d.className = 'el-cell';
  d.style.cssText = `width:${size}px;height:${size}px;background:${getColor(el)}`;
  const fs1 = Math.max(7,  Math.floor(size * 0.17));
  const fs2 = Math.max(9,  Math.floor(size * 0.26));
  const fs3 = Math.max(6,  Math.floor(size * 0.14));
  d.innerHTML =
    `<span class="el-num"  style="font-size:${fs1}px">${el.num}</span>` +
    `<span class="el-sym"  style="font-size:${fs2}px">${el.sym}</span>` +
    `<span class="el-name" style="font-size:${fs3}px;padding:0 1px">${el.name}</span>`;
  if (activeFilter !== 'all' && el.cat !== activeFilter) d.classList.add('dimmed');
  d.addEventListener('click', () => showDetail(el));
  return d;
}

function renderGrid() {
  const size = makeCellSize();
  const grid = document.getElementById('pt-grid');
  grid.style.gridTemplateColumns = `40px repeat(18,${size}px)`;
  grid.innerHTML = '';

  // group header row
  grid.appendChild(Object.assign(document.createElement('div'), {className:'group-label'}));
  for (let g = 1; g <= 18; g++) {
    const lbl = document.createElement('div');
    lbl.className = 'group-label';
    lbl.style.cssText = `width:${size}px;font-size:9px`;
    lbl.textContent = g;
    grid.appendChild(lbl);
  }

  for (let p = 1; p <= 7; p++) {
    // period label
    const pl = document.createElement('div');
    pl.className = 'period-label';
    pl.style.cssText = `width:40px;height:${size}px`;
    pl.textContent = p;
    grid.appendChild(pl);

    for (let g = 1; g <= 18; g++) {
      // lanthanide / actinide placeholder
      if ((p === 6 || p === 7) && g === 3) {
        const ph = document.createElement('div');
        ph.className = 'placeholder';
        ph.style.cssText = `width:${size}px;height:${size}px;font-size:${Math.max(7, size*0.15)}px`;
        ph.textContent = p === 6 ? '57-71' : '89-103';
        grid.appendChild(ph);
        continue;
      }
      const el = ELEMENTS.find(e =>
        e.period === p && e.group === g &&
        !(e.num >= 57 && e.num <= 71) &&
        !(e.num >= 89 && e.num <= 103)
      );
      grid.appendChild(renderCell(el || null, size));
    }
  }

  // series rows
  ['lant-row','act-row'].forEach((rowId, idx) => {
    const row = document.getElementById(rowId);
    row.innerHTML = '';
    const start = idx === 0 ? 57 : 89;
    for (let n = start; n < start + 15; n++) {
      const el = ELEMENTS.find(e => e.num === n);
      if (el) row.appendChild(renderCell(el, size));
    }
  });
}

function showDetail(el) {
  document.getElementById('d-sym').textContent  = el.sym;
  document.getElementById('d-name').textContent = el.num + '. ' + el.name;
  document.getElementById('d-sub').textContent  = CAT_NAMES[el.cat] || el.cat;
  document.getElementById('d-num').textContent  = el.num;
  document.getElementById('d-mass').textContent = el.mass;
  document.getElementById('d-pg').textContent   = el.period + '주기 / ' + el.group + '족';
  document.getElementById('d-cat').textContent  = CAT_NAMES[el.cat] || el.cat;
  document.getElementById('d-desc').textContent = el.desc;
  document.getElementById('d-uses').textContent = el.uses;
  document.getElementById('d-disc').textContent = el.disc;
  document.getElementById('detail-header').style.background = getColor(el);

  const chips = document.getElementById('e-chips');
  chips.innerHTML = '';
  el.e.forEach((cnt, i) => {
    const c = document.createElement('div');
    c.className = 'e-chip';
    c.textContent = SHELLS[i] + '껍질: ' + cnt + 'e⁻';
    chips.appendChild(c);
  });
  document.getElementById('e-total').textContent =
    '총 전자 수: ' + el.e.reduce((a,b) => a+b, 0) + '개';

  drawAtom(el);
  window._currentEl = el;
  document.getElementById('detail-panel').style.display = 'flex';
}

function drawAtom(el) {
  const canvas = document.getElementById('atom-canvas');
  const ctx    = canvas.getContext('2d');
  const cardW  = document.querySelector('.detail-card').offsetWidth || 320;
  const size   = Math.max(160, Math.min(260, Math.floor(cardW * 0.72)));
  canvas.width  = size;
  canvas.height = size;
  canvas.style.width  = size + 'px';
  canvas.style.height = size + 'px';
  const W = size, H = size, cx = W/2, cy = H/2;
  ctx.clearRect(0, 0, W, H);

  const shells  = el.e.length;
  const maxR    = Math.min(cx, cy) - 14;
  const step    = shells > 0 ? maxR / (shells + 0.5) : 30;
  const nucR    = Math.min(18, step * 0.5);

  // nucleus
  ctx.beginPath();
  ctx.arc(cx, cy, nucR, 0, Math.PI*2);
  ctx.fillStyle = '#E24B4A';
  ctx.fill();

  const total = el.e.reduce((a,b) => a+b, 0);
  ctx.fillStyle = 'white';
  ctx.font = `bold ${Math.min(13, nucR*0.85)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(total+'+', cx, cy);

  // shells
  el.e.forEach((cnt, si) => {
    const r  = step * (si + 1);
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.strokeStyle = '#378ADD';
    ctx.lineWidth   = 1;
    ctx.stroke();

    const eR = Math.min(5, step * 0.18);
    for (let i = 0; i < cnt; i++) {
      const angle = (2*Math.PI*i)/cnt - Math.PI/2;
      const ex = cx + r * Math.cos(angle);
      const ey = cy + r * Math.sin(angle);
      ctx.beginPath();
      ctx.arc(ex, ey, eR, 0, Math.PI*2);
      ctx.fillStyle = '#185FA5';
      ctx.fill();
      ctx.fillStyle = 'white';
      ctx.font = `bold ${Math.max(6, eR*1.4)}px sans-serif`;
      ctx.fillText('−', ex, ey + 0.5);
    }
  });
}

// Close handlers
document.getElementById('close-btn').addEventListener('click', () => {
  document.getElementById('detail-panel').style.display = 'none';
});
document.getElementById('detail-panel').addEventListener('click', function(e) {
  if (e.target === this) this.style.display = 'none';
});

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    activeFilter = this.dataset.cat;
    renderGrid();
  });
});

// Initial render + resize
renderGrid();
window.addEventListener('resize', () => {
  clearTimeout(window._resizeTimer);
  window._resizeTimer = setTimeout(() => {
    renderGrid();
    if (document.getElementById('detail-panel').style.display !== 'none' && window._currentEl) {
      drawAtom(window._currentEl);
    }
  }, 100);
});
</script>
