<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주기율표</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%;background:#f5f5f5}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#f5f5f5;color:#222;
  min-height:100vh;
  display:flex;align-items:flex-start;justify-content:center;
  padding:12px;
}
.pt-wrap{width:fit-content;margin:0 auto}
.pt-title{font-weight:600;color:#222;text-align:center}
.controls{display:flex;flex-wrap:wrap;align-items:center;justify-content:center}
.filter-btn{border:1.5px solid rgba(0,0,0,0.15);border-radius:20px;background:#fff;color:#444;cursor:pointer;transition:all 0.15s;font-weight:500;display:flex;align-items:center}
.filter-btn:hover{border-color:rgba(0,0,0,0.3);filter:brightness(0.95)}
.filter-btn.active{border-color:rgba(0,0,0,0.35);filter:brightness(0.88);font-weight:600;color:#222}
.filter-btn .dot{border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,0.15)}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.pt-grid{display:inline-grid;gap:2px}
.period-label{display:flex;align-items:center;justify-content:center;font-size:10px;color:#888;font-weight:500}
.group-label{display:flex;align-items:center;justify-content:center;font-size:9px;color:#aaa;padding-bottom:2px}
.el-cell{border-radius:4px;border:1px solid rgba(0,0,0,0.15);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform 0.1s,box-shadow 0.1s;overflow:hidden}
.el-cell:hover{transform:scale(1.05);z-index:10;box-shadow:0 2px 6px rgba(0,0,0,0.15)}
.el-cell.dimmed{opacity:0.15}
.el-num{line-height:1;color:rgba(0,0,0,0.5)}
.el-sym{font-weight:600;line-height:1.1;color:rgba(0,0,0,0.85)}
.el-name{line-height:1;color:rgba(0,0,0,0.55);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;text-align:center}
.placeholder{border-radius:4px;border:1px dashed #bbb;display:flex;align-items:center;justify-content:center;color:#aaa;cursor:default}
.empty{background:transparent;border:none}

/* 시리즈 섹션 - pt-grid와 정렬 맞추기 위해 JS로 width/margin 제어 */
.series-section{margin-top:14px}
.series-title{font-size:12px;color:#666;margin-bottom:4px;font-weight:500}
.series-row{display:flex;gap:2px;flex-wrap:nowrap}

/* Detail panel */
.detail-panel{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;gap:10px}
/* 카드 */
.detail-card{background:#fff;border-radius:16px;width:100%;max-width:420px;max-height:96vh;box-shadow:0 12px 40px rgba(0,0,0,0.2);display:flex;flex-direction:column;overflow:hidden}
/* 헤더 */
.detail-header{padding:18px 18px 14px;border-radius:16px 16px 0 0;flex-shrink:0;position:relative;display:flex;align-items:flex-start;gap:14px}
.dh-sym-box{display:flex;align-items:center;justify-content:center;border-radius:12px;background:rgba(0,0,0,0.12);flex-shrink:0}
.detail-sym{font-weight:800;line-height:1;color:rgba(0,0,0,0.82)}
.dh-info{flex:1;min-width:0}
.detail-num{font-size:12px;font-weight:600;color:rgba(0,0,0,0.45);margin-bottom:2px}
.detail-name{font-weight:700;color:#1a1a1a;line-height:1.1}
.detail-sub{color:rgba(0,0,0,0.5);margin-top:3px;line-height:1.3}
.detail-mass{color:rgba(0,0,0,0.45);margin-top:1px}
.close-btn{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.12);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:rgba(0,0,0,0.5);line-height:1;flex-shrink:0}
.close-btn:hover{background:rgba(0,0,0,0.2)}
/* 바디 스크롤 */
.detail-body{flex:1;overflow-y:auto;padding:14px 18px 16px;display:flex;flex-direction:column;gap:12px}
.detail-body::-webkit-scrollbar{width:4px}
.detail-body::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
/* 스탯 그리드 */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.stat-card{background:#f6f6f6;border-radius:10px;padding:9px 12px}
.stat-label{font-size:11px;color:#999;font-weight:500}
.stat-val{font-size:15px;font-weight:700;color:#1a1a1a;margin-top:2px}
/* 정보 rows */
.info-rows{display:flex;flex-direction:column;gap:0;border-radius:10px;overflow:hidden;border:1px solid #f0f0f0}
.info-row{display:flex;gap:10px;padding:9px 12px;border-bottom:1px solid #f0f0f0;background:#fff}
.info-row:last-child{border-bottom:none}
.info-label{font-size:11px;color:#999;font-weight:600;min-width:32px;padding-top:1px;flex-shrink:0}
.info-val{font-size:12px;color:#333;line-height:1.5}
/* 원자 구조 섹션 */
.atom-section{display:flex;flex-direction:column;gap:10px}
.atom-title{font-size:12px;font-weight:700;color:#444}
.atom-visual{display:flex;gap:14px;align-items:center}
.atom-canvas{display:block;flex-shrink:0;border-radius:50%}
/* 전자 껍질 바 */
.shell-bars{flex:1;display:flex;flex-direction:column;gap:6px}
.shell-bar-row{display:flex;align-items:center;gap:7px}
.shell-bar-label{font-size:11px;color:#888;font-weight:600;width:14px;text-align:right;flex-shrink:0}
.shell-bar-track{flex:1;height:8px;background:#e8e8e8;border-radius:4px;overflow:hidden}
.shell-bar-fill{height:100%;border-radius:4px;transition:width 0.5s ease}
.shell-bar-count{font-size:11px;color:#555;font-weight:600;width:28px;text-align:right;flex-shrink:0}
/* 전자 칩 */
.electron-chips{display:flex;flex-wrap:wrap;gap:5px}
.e-chip{background:#f0f4ff;border:1px solid #d4dfff;border-radius:6px;padding:3px 8px;font-size:11px;color:#3a5bd9;font-weight:600}
.e-total{font-size:11px;color:#999;margin-top:2px}
/* 푸터 */
.detail-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 14px;flex-shrink:0;border-top:1px solid #f0f0f0}
.footer-disc{font-size:11px;color:#aaa}
.footer-cat-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;color:rgba(0,0,0,0.6)}
/* 오른쪽 버튼 패널 */
.action-panel{display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.action-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.15s;font-family:inherit;white-space:nowrap;min-width:110px}
.action-btn.copy-btn{background:#f0f0f0;color:#444}
.action-btn.copy-btn:hover{background:#e2e2e2}
.action-btn.save-btn{background:#3a7de8;color:#fff}
.action-btn.save-btn:hover{background:#2c6fd4}
.action-btn:active{transform:scale(0.96)}
.action-btn.success{background:#22c55e!important;color:#fff!important}
.hint{margin-top:10px;text-align:center;color:#aaa}
</style>
</head>
<body>
<div class="pt-wrap" id="pt-wrap">
  <div class="pt-title">주기율표 (원자번호 1–118)</div>
  <div class="controls">
    <button class="filter-btn active" data-cat="all" style="background:#f0f0f0">전체</button>
    <button class="filter-btn" data-cat="metal" style="background:#85B7EB"><span class="dot" style="background:#378ADD"></span>금속</button>
    <button class="filter-btn" data-cat="metalloid" style="background:#C0DD97"><span class="dot" style="background:#639922"></span>준금속</button>
    <button class="filter-btn" data-cat="nonmetal" style="background:#FAC775"><span class="dot" style="background:#BA7517"></span>비금속</button>
  </div>
  <div class="table-scroll">
    <div id="pt-grid" class="pt-grid"></div>
  </div>

  <!-- 시리즈 섹션: JS가 margin-left와 width를 직접 설정 -->
  <div class="series-section" id="series-lant">
    <div class="series-title">란타넘족 (57–71)</div>
    <div class="series-row" id="lant-row"></div>
  </div>
  <div class="series-section" id="series-act">
    <div class="series-title">악티늄족 (89–118)</div>
    <div class="series-row" id="act-row1"></div>
    <div class="series-row" id="act-row2" style="margin-top:2px"></div>
  </div>

  <div class="hint">원소를 클릭하면 상세 정보를 볼 수 있습니다</div>
</div>

<!-- Detail Panel -->
<div class="detail-panel" id="detail-panel" style="display:none">
  <!-- 카드 -->
  <div class="detail-card" id="detail-card">
    <!-- 헤더 -->
    <div class="detail-header" id="detail-header">
      <button class="close-btn" id="close-btn">✕</button>
      <div class="dh-sym-box" id="dh-sym-box">
        <div class="detail-sym" id="d-sym"></div>
      </div>
      <div class="dh-info">
        <div class="detail-num" id="d-num-top"></div>
        <div class="detail-name" id="d-name"></div>
        <div class="detail-sub" id="d-sub"></div>
        <div class="detail-mass" id="d-mass-top"></div>
      </div>
    </div>

    <!-- 바디 -->
    <div class="detail-body">
      <!-- 스탯 카드 2×2 -->
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">원자번호</div><div class="stat-val" id="d-num"></div></div>
        <div class="stat-card"><div class="stat-label">원자량</div><div class="stat-val" id="d-mass"></div></div>
        <div class="stat-card"><div class="stat-label">주기 / 족</div><div class="stat-val" id="d-pg"></div></div>
        <div class="stat-card"><div class="stat-label">분류</div><div class="stat-val" id="d-cat"></div></div>
      </div>

      <!-- 설명·용도·발견 -->
      <div class="info-rows">
        <div class="info-row"><div class="info-label">설명</div><div class="info-val" id="d-desc"></div></div>
        <div class="info-row"><div class="info-label">용도</div><div class="info-val" id="d-uses"></div></div>
        <div class="info-row"><div class="info-label">발견</div><div class="info-val" id="d-disc"></div></div>
      </div>

      <!-- 원자 구조 -->
      <div class="atom-section">
        <div class="atom-title">원자 구조</div>
        <div class="atom-visual">
          <canvas id="atom-canvas" class="atom-canvas"></canvas>
          <div class="shell-bars" id="shell-bars"></div>
        </div>
        <div class="electron-chips" id="e-chips"></div>
        <div class="e-total" id="e-total"></div>
      </div>
    </div>

    <!-- 푸터 -->
    <div class="detail-footer">
      <div class="footer-disc" id="d-disc-footer"></div>
      <div class="footer-cat-badge" id="d-cat-badge"></div>
    </div>
  </div>

  <!-- 오른쪽 버튼 패널 -->
  <div class="action-panel">
    <button class="action-btn copy-btn" id="copy-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      클립보드에 복사
    </button>
    <button class="action-btn save-btn" id="save-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      PNG로 저장
    </button>
  </div>
</div>

<script>
const ELEMENTS = [
  {sym:"H",name:"수소",num:1,mass:1.008,period:1,group:1,cat:"nonmetal",e:[1],desc:"가장 간단한 원소로, 우주에서 가장 풍부한 원소입니다.",uses:"연료전지, 암모니아 합성, 수소화 반응",disc:"1766년 헨리 캐번디시"},
  {sym:"He",name:"헬륨",num:2,mass:4.003,period:1,group:18,cat:"nonmetal",e:[2],desc:"불활성 기체로, 공기보다 가벼워 풍선에 사용됩니다.",uses:"풍선, 저온냉각, 호흡용 기체 혼합물",disc:"1868년 피에르 장센"},
  {sym:"Li",name:"리튬",num:3,mass:6.94,period:2,group:1,cat:"metal",e:[2,1],desc:"가장 가벼운 금속으로, 배터리에 널리 사용됩니다.",uses:"리튬 배터리, 정신과 약물, 합금",disc:"1817년 요한 아르페드손"},
  {sym:"Be",name:"베릴륨",num:4,mass:9.012,period:2,group:2,cat:"metal",e:[2,2],desc:"독성이 있지만 우주항공 분야에서 중요한 경량 금속입니다.",uses:"우주항공 합금, X선 창문, 핵반응로",disc:"1797년 루이 보클랭"},
  {sym:"B",name:"붕소",num:5,mass:10.81,period:2,group:13,cat:"metalloid",e:[2,3],desc:"준금속으로, 유리와 세라믹 제조에 사용됩니다.",uses:"붕규산 유리, 세제, 방부제",disc:"1808년 험프리 데이비"},
  {sym:"C",name:"탄소",num:6,mass:12.01,period:2,group:14,cat:"nonmetal",e:[2,4],desc:"생명체의 기본 구성 요소이며 다이아몬드와 흑연의 성분입니다.",uses:"플라스틱, 강철, 다이아몬드, 연료",disc:"고대부터 알려짐"},
  {sym:"N",name:"질소",num:7,mass:14.01,period:2,group:15,cat:"nonmetal",e:[2,5],desc:"대기의 78%를 차지하며, 단백질과 DNA의 구성요소입니다.",uses:"비료, 폭발물, 액체질소 냉각",disc:"1772년 다니엘 러더퍼드"},
  {sym:"O",name:"산소",num:8,mass:16.00,period:2,group:16,cat:"nonmetal",e:[2,6],desc:"생명 유지에 필수적이며, 연소와 호흡에 관여합니다.",uses:"호흡, 연소, 의료용 산소, 로켓 연료",disc:"1774년 조제프 프리스틀리"},
  {sym:"F",name:"플루오린",num:9,mass:19.00,period:2,group:17,cat:"nonmetal",e:[2,7],desc:"가장 반응성이 높은 원소로, 원소 자체는 독성이 강하며 불화나트륨 등 화합물 형태로 치약에 사용됩니다.",uses:"치약(불화물 형태), 테프론, 냉매, 우라늄 농축",disc:"1886년 앙리 무아상"},
  {sym:"Ne",name:"네온",num:10,mass:20.18,period:2,group:18,cat:"nonmetal",e:[2,8],desc:"불활성 기체로, 네온사인의 주황빛을 만들어냅니다.",uses:"네온사인, 레이저, 저온냉각",disc:"1898년 윌리엄 램지"},
  {sym:"Na",name:"나트륨",num:11,mass:22.99,period:3,group:1,cat:"metal",e:[2,8,1],desc:"소금의 구성 성분으로, 생체 내 전해질 균형에 중요합니다.",uses:"소금, 비누, 가로등(나트륨등)",disc:"1807년 험프리 데이비"},
  {sym:"Mg",name:"마그네슘",num:12,mass:24.31,period:3,group:2,cat:"metal",e:[2,8,2],desc:"가벼우면서도 강한 금속으로, 합금 제조에 널리 사용됩니다.",uses:"항공기 부품, 자동차 휠, 플래시 촬영",disc:"1755년 조제프 블랙"},

  {sym:"Ar",name:"아르곤",num:18,mass:39.95,period:3,group:18,cat:"nonmetal",e:[2,8,8],desc:"대기 중에서 세 번째로 많은 불활성 기체입니다.",uses:"용접용 보호가스, 백열전구, 레이저",disc:"1894년 로드 레일리"},
  {sym:"K",name:"칼륨",num:19,mass:39.10,period:4,group:1,cat:"metal",e:[2,8,8,1],desc:"식물 성장에 필수적이며, 신경 전달에 중요한 역할을 합니다.",uses:"비료, 화약, 의약품, 전해질",disc:"1807년 험프리 데이비"},

const CAT_COLORS={metal:"#85B7EB",metalloid:"#C0DD97",nonmetal:"#FAC775"};
const CAT_NAMES={metal:"금속",metalloid:"준금속",nonmetal:"비금속"};
const SHELLS=['K','L','M','N','O','P','Q'];
let activeFilter='all';

// 주기율표 전체 열 수: period-label(1) + 18열 = 19
// 셀 간격: 2px gap
// period-label 너비: 40px
const PERIOD_LBL_W = 40;
const GAP = 2;
const NUM_GROUPS = 18;

function makeCellSize(){
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  // 좌우 body padding: 24px, period-label: 40px, gap 18개: 36px
  const byW = Math.floor((vw - 24 - PERIOD_LBL_W - GAP * NUM_GROUPS) / NUM_GROUPS);
  // 상단 고정 요소 높이: title(30) + controls(44) + series(약 130) + hint(24) + padding(24)
  const reservedH = 30 + 44 + 130 + 24 + 24;
  // 주기 행: 1(헤더) + 7(주기) = 8행, gap 7개
  const byH = Math.floor((vh - reservedH - GAP * 7) / 8);
  return Math.max(24, Math.min(52, Math.min(byW, byH)));
}

function getColor(el){return CAT_COLORS[el.cat]||'#ccc';}

function renderCell(el, size){
  const d = document.createElement('div');
  if(!el){
    d.className='empty';
    d.style.cssText=`width:${size}px;height:${size}px`;
    return d;
  }
  d.className='el-cell';
  d.style.cssText=`width:${size}px;height:${size}px;background:${getColor(el)}`;
  const fs1 = Math.max(7, Math.floor(size * 0.17));
  const fs2 = Math.max(9, Math.floor(size * 0.26));
  const fs3 = Math.max(6, Math.floor(size * 0.14));
  d.innerHTML =
    `<span class="el-num" style="font-size:${fs1}px">${el.num}</span>`+
    `<span class="el-sym" style="font-size:${fs2}px">${el.sym}</span>`+
    `<span class="el-name" style="font-size:${fs3}px;padding:0 1px">${el.name}</span>`;
  if(activeFilter !== 'all' && el.cat !== activeFilter) d.classList.add('dimmed');
  d.addEventListener('click', ()=>showDetail(el));
  return d;
}

function renderGrid(){
  const size = makeCellSize();
  const cellStep = size + GAP; // 셀 크기 + gap

  // ── 제목 & 컨트롤 크기 동적 조절 ──
  // size 범위 24~52 → 제목 11~20px, 컨트롤 9~14px, 버튼 패딩/gap 비례
  const titleFS  = Math.round(11 + (size - 24) * (20 - 11) / (52 - 24));
  const titleMB  = Math.round(6  + (size - 24) * (14 - 6)  / (52 - 24));
  const ctrlFS   = Math.round(9  + (size - 24) * (14 - 9)  / (52 - 24));
  const ctrlGap  = Math.round(4  + (size - 24) * (8  - 4)  / (52 - 24));
  const ctrlMB   = Math.round(6  + (size - 24) * (14 - 6)  / (52 - 24));
  const btnPadV  = Math.round(3  + (size - 24) * (7  - 3)  / (52 - 24));
  const btnPadH  = Math.round(8  + (size - 24) * (16 - 8)  / (52 - 24));
  const btnGap   = Math.round(3  + (size - 24) * (6  - 3)  / (52 - 24));
  const dotSize  = Math.round(7  + (size - 24) * (12 - 7)  / (52 - 24));
  const hintFS   = Math.round(9  + (size - 24) * (12 - 9)  / (52 - 24));

  const titleEl = document.querySelector('.pt-title');
  titleEl.style.fontSize   = titleFS + 'px';
  titleEl.style.marginBottom = titleMB + 'px';

  const controlsEl = document.querySelector('.controls');
  controlsEl.style.gap         = ctrlGap + 'px';
  controlsEl.style.marginBottom = ctrlMB + 'px';

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.style.fontSize = ctrlFS + 'px';
    btn.style.padding  = `${btnPadV}px ${btnPadH}px`;
    btn.style.gap      = btnGap + 'px';
  });
  document.querySelectorAll('.filter-btn .dot').forEach(dot => {
    dot.style.width  = dotSize + 'px';
    dot.style.height = dotSize + 'px';
  });

  const hintEl = document.querySelector('.hint');
  if(hintEl) hintEl.style.fontSize = hintFS + 'px';

  // ── 메인 그리드 ──
  const grid = document.getElementById('pt-grid');
  grid.style.gridTemplateColumns = `${PERIOD_LBL_W}px repeat(${NUM_GROUPS}, ${size}px)`;
  grid.innerHTML = '';

  // 헤더 행: 빈 칸 + 족 번호 18개
  grid.appendChild(Object.assign(document.createElement('div'), {className:'group-label'}));
  for(let g = 1; g <= NUM_GROUPS; g++){
    const lbl = document.createElement('div');
    lbl.className = 'group-label';
    lbl.style.cssText = `width:${size}px;font-size:9px`;
    lbl.textContent = g;
    grid.appendChild(lbl);
  }

  // 주기 행
  for(let p = 1; p <= 7; p++){
    const pl = document.createElement('div');
    pl.className = 'period-label';
    pl.style.cssText = `width:${PERIOD_LBL_W}px;height:${size}px`;
    pl.textContent = p;
    grid.appendChild(pl);

    for(let g = 1; g <= NUM_GROUPS; g++){
      if((p === 6 || p === 7) && g === 3){
        const ph = document.createElement('div');
        ph.className = 'placeholder';
        ph.style.cssText = `width:${size}px;height:${size}px;font-size:${Math.max(7,size*0.15)}px`;
        ph.textContent = p === 6 ? '57-71' : '89-118';
        grid.appendChild(ph);
        continue;
      }
      const el = ELEMENTS.find(e =>
        e.period === p && e.group === g &&
        !(e.num >= 57 && e.num <= 71) &&
        !(e.num >= 89 && e.num <= 118)
      );
      grid.appendChild(renderCell(el || null, size));
    }
  }

  // ── 시리즈 섹션 정렬 ──
  // 3족(group=3)은 grid에서 period-label 다음 3번째 열 → 왼쪽 offset
  // offset = period-label_W + gap + (3-1) * cellStep = PERIOD_LBL_W + GAP + 2*cellStep
  const seriesMarginLeft = PERIOD_LBL_W + GAP + 2 * cellStep;
  // 시리즈 행 너비: 15개 원소 × cellStep - 마지막 gap
  const seriesWidth15 = 15 * cellStep - GAP;

  // 란타넘족 (57–71): 15개
  const seriesLant = document.getElementById('series-lant');
  seriesLant.style.marginLeft = seriesMarginLeft + 'px';
  const lantRow = document.getElementById('lant-row');
  lantRow.innerHTML = '';
  for(let n = 57; n <= 71; n++){
    const el = ELEMENTS.find(e => e.num === n);
    if(el) lantRow.appendChild(renderCell(el, size));
  }

  // 악티늄족 (89–103 첫 줄, 104–118 둘째 줄): 각 15개
  const seriesAct = document.getElementById('series-act');
  seriesAct.style.marginLeft = seriesMarginLeft + 'px';

  const actRow1 = document.getElementById('act-row1');
  actRow1.innerHTML = '';
  for(let n = 89; n <= 103; n++){
    const el = ELEMENTS.find(e => e.num === n);
    if(el) actRow1.appendChild(renderCell(el, size));
  }

  const actRow2 = document.getElementById('act-row2');
  actRow2.innerHTML = '';
  for(let n = 104; n <= 118; n++){
    const el = ELEMENTS.find(e => e.num === n);
    if(el) actRow2.appendChild(renderCell(el, size));
  }
}

function showDetail(el){
  const color = getColor(el);
  const catName = CAT_NAMES[el.cat] || el.cat;

  // 헤더
  document.getElementById('detail-header').style.background = color;
  const symBox = document.getElementById('dh-sym-box');
  // symBox 크기를 동적으로
  symBox.style.width = '72px'; symBox.style.height = '72px';
  const symEl = document.getElementById('d-sym');
  symEl.style.fontSize = el.sym.length <= 2 ? '38px' : '26px';
  symEl.textContent = el.sym;
  document.getElementById('d-num-top').textContent = el.num;
  document.getElementById('d-name').style.fontSize = el.name.length > 5 ? '16px' : '20px';

  document.getElementById('d-sub').textContent = catName + ' · ' + el.period + '주기 ' + el.group + '족';
  document.getElementById('d-mass-top').style.fontSize = '12px';
  document.getElementById('d-mass-top').textContent = '원자량 ' + el.mass;

  // 스탯
  document.getElementById('d-num').textContent = el.num;
  document.getElementById('d-mass').textContent = el.mass;
  document.getElementById('d-pg').textContent = el.period + '주기 / ' + el.group + '족';
  document.getElementById('d-cat').textContent = catName;

  // 정보
  document.getElementById('d-desc').textContent = el.desc;
  document.getElementById('d-uses').textContent = el.uses;
  document.getElementById('d-disc').textContent = el.disc;

  // 전자 껍질 바
  const maxE = Math.max(...el.e, 32);
  const barColors = ['#4a9eff','#4a9eff','#4a9eff','#4a9eff','#4a9eff','#4a9eff','#4a9eff'];
  const shellBars = document.getElementById('shell-bars');
  shellBars.innerHTML = '';
  el.e.forEach((cnt, i) => {
    const row = document.createElement('div');
    row.className = 'shell-bar-row';
    row.innerHTML = `
      <div class="shell-bar-label">${SHELLS[i]}</div>
      <div class="shell-bar-track"><div class="shell-bar-fill" style="width:0%;background:${barColors[i]}"></div></div>
      <div class="shell-bar-count">${cnt}e⁻</div>`;
    shellBars.appendChild(row);
    // 애니메이션
    requestAnimationFrame(()=>{
      setTimeout(()=>{
        row.querySelector('.shell-bar-fill').style.width = (cnt / maxE * 100) + '%';
      }, i * 60);
    });
  });

  // 전자 칩
  const chips = document.getElementById('e-chips');
  chips.innerHTML = '';
  el.e.forEach((cnt, i) => {
    const c = document.createElement('div');
    c.className = 'e-chip';
    c.textContent = SHELLS[i] + '껍질: ' + cnt + 'e⁻';
    chips.appendChild(c);
  });
  document.getElementById('e-total').textContent = '총 전자 수: ' + el.e.reduce((a,b)=>a+b,0) + '개';

  // 푸터
  document.getElementById('d-disc-footer').textContent = '발견: ' + el.disc;
  const badge = document.getElementById('d-cat-badge');
  badge.textContent = catName;
  badge.style.background = color;

  document.getElementById('detail-panel').style.display = 'flex';
  window._currentEl = el;
  requestAnimationFrame(()=>drawAtom(el));
}

function drawAtom(el){
  const canvas = document.getElementById('atom-canvas');
  const ctx = canvas.getContext('2d');
  // 고정 크기 110px
  const size = 110;
  canvas.width = size; canvas.height = size;
  canvas.style.width = size + 'px'; canvas.style.height = size + 'px';
  const cx = size/2, cy = size/2;
  ctx.clearRect(0, 0, size, size);
  const maxR = size/2 - 6;
  const step = el.e.length > 0 ? maxR / (el.e.length + 0.5) : 20;
  const nucR = Math.min(13, step * 0.55);

  // 궤도
  el.e.forEach((cnt, si) => {
    const r = step * (si + 1);
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(58,125,232,0.25)'; ctx.lineWidth = 1.2; ctx.stroke();
  });

  // 핵
  const grad = ctx.createRadialGradient(cx-nucR*0.3, cy-nucR*0.3, 1, cx, cy, nucR);
  grad.addColorStop(0, '#ff6b6b'); grad.addColorStop(1, '#c0392b');
  ctx.beginPath(); ctx.arc(cx, cy, nucR, 0, Math.PI*2);
  ctx.fillStyle = grad; ctx.fill();
  const total = el.e.reduce((a,b)=>a+b, 0);
  ctx.fillStyle = 'white';
  ctx.font = `bold ${Math.min(10, nucR*0.9)}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(total + '+', cx, cy);

  // 전자
  el.e.forEach((cnt, si) => {
    const r = step * (si + 1);
    const eR = Math.min(3.5, step * 0.18);
    for(let i = 0; i < cnt; i++){
      const angle = (2*Math.PI*i)/cnt - Math.PI/2;
      const ex = cx + r*Math.cos(angle), ey = cy + r*Math.sin(angle);
      ctx.beginPath(); ctx.arc(ex, ey, eR, 0, Math.PI*2);
      ctx.fillStyle = '#3a7de8'; ctx.fill();
    }
  });
}

// ── PNG 저장 (html2canvas로 실제 카드 DOM 캡처) ──
document.getElementById('save-btn').addEventListener('click', async ()=>{
  const el = window._currentEl;
  if(!el) return;
  const btn = document.getElementById('save-btn');
  const origHTML = btn.innerHTML;
  btn.innerHTML = '저장 중...'; btn.disabled = true;

  // html2canvas 동적 로드
  if(!window.html2canvas){
    await new Promise((res, rej)=>{
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }

  const card = document.getElementById('detail-card');
  try {
    const cvs = await html2canvas(card, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false,
    });
    const link = document.createElement('a');
    link.download = `${el.sym}_${el.name}.png`;
    link.href = cvs.toDataURL('image/png');
    link.click();
  } catch(e) {
    alert('저장 중 오류가 발생했습니다.');
  }

  btn.innerHTML = origHTML; btn.disabled = false;
});
